name: "publish"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
          - platform: "macos-latest"
            args: "--verbose --no-sign"
            mobile: "ios"
          - platform: "ubuntu-latest"
            args: ""
          - platform: "ubuntu-latest"
            args: "--verbose"
            mobile: "android"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
          cache: "bun"

      - name: install Rust stable (desktop)
        if: matrix.mobile == ''
        uses: dtolnay/rust-toolchain@stable # Set this to dtolnay/rust-toolchain@nightly
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install Rust stable (android)
        if: matrix.mobile == 'android'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: install Rust stable (ios)
        if: matrix.mobile == 'ios'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Set up JDK
        if: matrix.mobile == 'android'
        uses: actions/setup-java@v5
        with:
          java-version: "21" # Maybe 17
          distribution: "temurin"

      - name: Setup Android SDK
        if: matrix.mobile == 'android'
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        if: matrix.mobile == 'android'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
          link-to-sdk: true

      - uses: maxim-lobanov/setup-xcode@v1
        if: matrix.mobile == 'ios'
        with:
          xcode-version: 26.1

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: init mobile project
        if: matrix.mobile != ''
        run: |
          bunx @tauri-apps/cli ${{ matrix.mobile }} init

      - name: install frontend dependencies
        # If you don't have `beforeBuildCommand` configured you may want to build your frontend here too.
        run: bun install

      - name: prepare API keys
        run: bun ./app/scripts/prepareKeys.ts ${{ secrets.FIREBASE_API_KEY }} ${{ secrets.IMGBB_API_KEY }}

      - uses: tauri-apps/tauri-action@v0
        if: matrix.mobile == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: quiznac-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: QUIZNAC v__VERSION__
          releaseBody: Voir les assets pour installer l'application sur différentes plateformes.
          args: ${{ matrix.args }}

      - name: build mobile
        if: matrix.mobile != ''
        run: bunx @tauri-apps/cli ${{ matrix.mobile }} build

      - name: publish ios
        if: matrix.mobile == 'ios'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: quiznac-v__VERSION__
          name: QUIZNAC v__VERSION__
          body: Voir les assets pour installer l'application sur différentes plateformes.
          files: |
            ./src-tauri/gen/apple/build/arm64/Quiznac.ipa

      - name: publish android
        if: matrix.mobile == 'android'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: quiznac-v__VERSION__
          name: QUIZNAC v__VERSION__
          body: Voir les assets pour installer l'application sur différentes plateformes.
          files: |
            ./src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
            ./src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab
